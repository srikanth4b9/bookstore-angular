name: E2E Tests

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  cypress:
    name: Cypress E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Build Angular app
        run: npm run build

      - name: Start server and run Cypress
        run: |
          npx angular-http-server --path dist/dev/browser --port 4200 &
          npx wait-on http://localhost:4200 --timeout 60000
          npx cypress run --reporter json --reporter-options output=cypress-results.json 2>&1 | tee cypress-output.txt
        env:
          CI: true

      - name: Upload Cypress results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-results
          path: |
            cypress-output.txt
            cypress-results.json
            e2e/screenshots/
            e2e/videos/
          retention-days: 7

  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build Angular app
        run: npm run build

      - name: Run Playwright tests
        run: |
          npx angular-http-server --path dist/dev/browser --port 4200 &
          npx wait-on http://localhost:4200 --timeout 60000
          npx playwright test --reporter=list 2>&1 | tee playwright-output.txt
        env:
          CI: true

      - name: Upload Playwright results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            playwright-output.txt
            playwright-report/
            test-results/
          retention-days: 7

  report:
    name: E2E Summary
    runs-on: ubuntu-latest
    needs: [cypress, playwright]
    if: always() && github.event_name == 'pull_request'
    steps:
      - name: Download Cypress results
        uses: actions/download-artifact@v4
        with:
          name: cypress-results
          path: cypress-results
        continue-on-error: true

      - name: Download Playwright results
        uses: actions/download-artifact@v4
        with:
          name: playwright-results
          path: playwright-results
        continue-on-error: true

      - name: Post E2E summary comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const cypressStatus = '${{ needs.cypress.result }}';
            const playwrightStatus = '${{ needs.playwright.result }}';

            const icon = (s) => s === 'success' ? '✅' : s === 'failure' ? '❌' : '⚠️';

            let cypressDetails = 'No output available.';
            try {
              const raw = fs.readFileSync('cypress-results/cypress-output.txt', 'utf8');
              const lines = raw.split('\n');
              const summaryLines = lines.filter(l =>
                l.includes('passing') || l.includes('failing') || l.includes('Tests:') || l.includes('Specs:')
              );
              cypressDetails = summaryLines.length > 0
                ? summaryLines.join('\n')
                : lines.slice(-15).join('\n');
            } catch {}

            let playwrightDetails = 'No output available.';
            try {
              const raw = fs.readFileSync('playwright-results/playwright-output.txt', 'utf8');
              const lines = raw.split('\n');
              const summaryLines = lines.filter(l =>
                l.includes('passed') || l.includes('failed') || l.includes('skipped')
              );
              playwrightDetails = summaryLines.length > 0
                ? summaryLines.join('\n')
                : lines.slice(-15).join('\n');
            } catch {}

            const body = [
              '## 🧪 E2E Regression Report',
              '',
              '| Framework | Status |',
              '|-----------|--------|',
              `| ${icon(cypressStatus)} Cypress | **${cypressStatus}** |`,
              `| ${icon(playwrightStatus)} Playwright | **${playwrightStatus}** |`,
              '',
              '<details>',
              '<summary>Cypress output</summary>',
              '',
              '```',
              cypressDetails,
              '```',
              '',
              '</details>',
              '',
              '<details>',
              '<summary>Playwright output</summary>',
              '',
              '```',
              playwrightDetails,
              '```',
              '',
              '</details>',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('🧪 E2E Regression Report')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
