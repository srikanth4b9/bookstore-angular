name: Prettier

on:
  pull_request:
    branches: [main]

concurrency:
  group: prettier-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  format-check:
    name: Prettier Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Check formatting
        run: npm run format:check
