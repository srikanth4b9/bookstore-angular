name: Sync Docs to Wiki

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'

permissions:
  contents: write

jobs:
  sync-wiki:
    name: Sync docs/ to GitHub Wiki
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync to Wiki
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "Sreekanth Reddy"
          git config --global user.email "sreekanth.yarram@gmail.com"

          # Clone the wiki repo
          git clone https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.wiki.git wiki

          # Remove only .md files (preserve .git)
          rm -f wiki/*.md

          # Copy docs with wiki-friendly filenames
          cp docs/architecture.md wiki/Architecture.md
          cp docs/api-documentation.md wiki/Api-Documentation.md
          cp docs/development-guide.md wiki/Development-Guide.md
          cp docs/deployment-guide.md wiki/Deployment-Guide.md
          cp docs/contributing.md wiki/Contributing.md
          cp docs/database-schema.md wiki/Database-Schema.md
          cp docs/testing-guide.md wiki/Testing-Guide.md

          # Create Home page
          cat > wiki/Home.md << 'EOF'
          # Bookstore Angular — Documentation

          Welcome to the project wiki. Browse the pages below or use the sidebar.

          | Page | Description |
          |------|-------------|
          | [Architecture](Architecture) | Frontend/backend architecture, data flow, routing |
          | [API Documentation](Api-Documentation) | All REST endpoints, request/response formats |
          | [Development Guide](Development-Guide) | Setup, scripts, code style, project structure |
          | [Deployment Guide](Deployment-Guide) | Build, environment variables, production setup |
          | [Contributing](Contributing) | Branch naming, commit conventions, PR process |
          | [Database Schema](Database-Schema) | MongoDB collections, fields, indexes, seeding |
          | [Testing Guide](Testing-Guide) | Jest, ng-mocks patterns, coverage, CI |
          EOF

          # Create sidebar
          cat > wiki/_Sidebar.md << 'EOF'
          ### Navigation

          - [Home](Home)
          - [Architecture](Architecture)
          - [API Documentation](Api-Documentation)
          - [Development Guide](Development-Guide)
          - [Deployment Guide](Deployment-Guide)
          - [Contributing](Contributing)
          - [Database Schema](Database-Schema)
          - [Testing Guide](Testing-Guide)
          EOF

          # Remove heredoc leading whitespace
          sed -i 's/^          //' wiki/Home.md wiki/_Sidebar.md

          # Push to wiki
          cd wiki
          git add -A
          if git diff --cached --quiet; then
            echo "No wiki changes to commit"
          else
            git commit -m "Sync docs from main branch"
            git push
          fi