<mat-toolbar color="primary" class="navbar-toolbar shadow">
  <span routerLink="/" class="nav-brand">📚 BookStore</span>
  <span class="spacer"></span>
  <div class="nav-links">
    <a mat-button routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a>
    <a mat-button routerLink="/books" routerLinkActive="active">Books</a>
    <a mat-button routerLink="/categories" routerLinkActive="active">Categories</a>
    <a mat-button routerLink="/cart" routerLinkActive="active">
      <mat-icon [matBadge]="cartCount()" matBadgeColor="accent">shopping_cart</mat-icon>
    </a>
    @if (user()) {
      <a mat-button routerLink="/account" routerLinkActive="active">
        <mat-icon>account_circle</mat-icon>
      </a>
    } @else {
      <a mat-button routerLink="/login" routerLinkActive="active">Login</a>
    }
  </div>
</mat-toolbar>
