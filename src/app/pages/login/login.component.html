<div class="auth-page">
  <div class="auth-card">
    <h1>Login</h1>
    <form (submit)="login()">
      <div class="form-group">
        <label for="emailInput">Email</label>
        <input id="emailInput" type="email" [(ngModel)]="email" name="email" required>
      </div>
      <div class="form-group">
        <label for="passwordInput">Password</label>
        <input id="passwordInput" type="password" [(ngModel)]="password" name="password" required>
      </div>
      <button type="submit" class="auth-btn">Login</button>
    </form>
    <p class="switch-auth">
      Don't have an account? <a routerLink="/register">Register here</a>
    </p>
  </div>
</div>
