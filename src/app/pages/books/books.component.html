<div class="books-page">
  <aside class="filters">
    <h3>Filters</h3>
    <div class="filter-group">
      <label for="searchInput">Search</label>
      <input id="searchInput" type="text" [(ngModel)]="searchTerm" placeholder="Title, author, ISBN...">
    </div>
    <div class="filter-group">
      <label for="categorySelect">Category</label>
      <select id="categorySelect" [(ngModel)]="selectedCategory">
        <option value="">All Categories</option>
        @for (cat of categories(); track cat.id) {
          <option [value]="cat.name">{{ cat.name }}</option>
        }
      </select>
    </div>
    <div class="filter-group">
      <label for="sortSelect">Sort By</label>
      <select id="sortSelect" [(ngModel)]="sortBy">
        <option value="createdAt">Newest</option>
        <option value="price">Price</option>
        <option value="rating">Rating</option>
        <option value="title">Title</option>
      </select>
    </div>
    <div class="filter-group">
      <label for="sortOrder">Order</label>
      <select id="sortOrder" [(ngModel)]="sortOrder">
        <option value="desc">Descending</option>
        <option value="asc">Ascending</option>
      </select>
    </div>
  </aside>

  <main class="book-list">
    <h2>Books</h2>
    <div class="book-grid">
      @for (book of books(); track book.id) {
        <div class="book-card">
          <img [src]="book.imageUrl" [alt]="book.title">
          <h3>{{ book.title }}</h3>
          <p>{{ book.author }}</p>
          <p class="price">{{ book.price | currency }}</p>
          <div class="rating">⭐ {{ book.rating }}</div>
          <div class="actions">
            <a [routerLink]="['/books', book.id]" class="view-btn">Details</a>
            <button (click)="addToCart(book)" class="add-btn">Add to Cart</button>
          </div>
        </div>
      } @empty {
        <p>No books found matching your criteria.</p>
      }
    </div>

    <div class="pagination-controls">
      <button [disabled]="pagination().page === 1" (click)="onPageChange(pagination().page - 1)">Previous</button>
      <span>Page {{ pagination().page }} of {{ pagination().pages }}</span>
      <button [disabled]="pagination().page === pagination().pages" (click)="onPageChange(pagination().page + 1)">Next</button>
    </div>
  </main>
</div>
