<div class="auth-page">
  <div class="auth-card">
    <h1>Register</h1>
    <form (submit)="register()">
      <div class="form-group">
        <label for="nameInput">Full Name</label>
        <input id="nameInput" type="text" [(ngModel)]="name" name="name" required>
      </div>
      <div class="form-group">
        <label for="emailInput">Email</label>
        <input id="emailInput" type="email" [(ngModel)]="email" name="email" required>
      </div>
      <div class="form-group">
        <label for="passwordInput">Password</label>
        <input id="passwordInput" type="password" [(ngModel)]="password" name="password" required>
      </div>
      <button type="submit" class="auth-btn">Register</button>
    </form>
    <p class="switch-auth">
      Already have an account? <a routerLink="/login">Login here</a>
    </p>
  </div>
</div>
