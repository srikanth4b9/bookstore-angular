<div class="categories-page">
  <h1 class="page-title">Browse Categories</h1>

  @if (isLoading()) {
    <div class="loading-shade flex-center">
      <mat-spinner></mat-spinner>
    </div>
  }

  <div class="categories-grid">
    @for (cat of categories(); track cat.id) {
      <mat-card class="category-card shadow" [routerLink]="['/books']" [queryParams]="{category: cat.name}">
        <mat-card-content class="flex-center">
          <mat-icon color="primary">folder_open</mat-icon>
          <div class="cat-info">
            <h3>{{ cat.name }}</h3>
            @if (cat.description) {
              <p>{{ cat.description }}</p>
            }
          </div>
        </mat-card-content>
        <mat-card-actions align="end">
          <button mat-button color="primary">VIEW BOOKS</button>
        </mat-card-actions>
      </mat-card>
    } @empty {
      @if (!isLoading()) {
        <p class="empty-msg">No categories found.</p>
      }
    }
  </div>
</div>
